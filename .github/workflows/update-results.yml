name: Update World Cup Results

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Limpiar datos demo si fecha >= 10 junio 2026
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [[ "$TODAY" > "2026-06-09" ]] || [[ "$TODAY" == "2026-06-10" ]]; then
            cp results-empty.js results.js
            echo "🗑️ Demo data borrada — fecha: $TODAY"
          else
            echo "📅 Demo data se mantiene hasta el 10 junio 2026 (hoy: $TODAY)"
          fi

      - name: Run scraper
        run: node scraper/scrape.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.js
          if ! git diff --cached --quiet; then
            git commit -m "Actualiza resultados $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
