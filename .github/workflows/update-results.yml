name: Update World Cup Results

on:
  schedule:
    # Se ejecuta dos veces al dia (a las 06:00 y 18:00 UTC) para estar al dia con los partidos
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check if tournament is active (before 2026-07-21)
        id: check-date
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          LIMIT_DATE="2026-07-21"
          if [[ "$CURRENT_DATE" > "$LIMIT_DATE" || "$CURRENT_DATE" == "$LIMIT_DATE" ]]; then
            echo "El Mundial 2026 ha finalizado (limite: 2026-07-20). Se desactiva la sincronizacion."
            echo "run_sync=false" >> $GITHUB_OUTPUT
          else
            echo "El Mundial 2026 sigue activo. Ejecutando sincronizacion."
            echo "run_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-date.outputs.run_sync == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Fetch from original repository (upstream)
        if: steps.check-date.outputs.run_sync == 'true'
        run: |
          git remote add upstream https://github.com/jjimenezgarcia/worldcup2026-prediction.git
          git fetch upstream

      - name: Update results.js from upstream
        if: steps.check-date.outputs.run_sync == 'true'
        run: |
          git checkout upstream/main -- results.js

      - name: Commit and push if changed
        if: steps.check-date.outputs.run_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.js
          if ! git diff --cached --quiet; then
            git commit -m "Actualiza resultados reales desde upstream $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "No changes in results.js"
          fi
